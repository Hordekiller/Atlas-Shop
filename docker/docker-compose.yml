services:
  api:
    build:
      context: ../apps/api
      dockerfile: ../../docker/api.Dockerfile
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://atlas:atlas@db:5432/atlas_shop
      - JWT_SECRET=production-secret-change-me
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./storage:/app/storage

  web:
    build:
      context: ../apps/web
      dockerfile: ../../docker/web.Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000/api/v1
    depends_on:
      - api

  admin:
    build:
      context: ../apps/admin
      dockerfile: ../../docker/admin.Dockerfile
    ports:
      - "3001:3001"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000/api/v1
    depends_on:
      - api

  db:
    image: postgres:16-alpine
    environment:
      - POSTGRES_USER=atlas
      - POSTGRES_PASSWORD=atlas
      - POSTGRES_DB=atlas_shop
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U atlas"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
